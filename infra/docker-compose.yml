services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: ../producer
    container_name: producer
    ports:
      - "5001:5000"
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../producer:/app
      - /app/node_modules
    command: pnpm dev
    restart: unless-stopped

  worker:
    build:
      context: ../worker
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=worker-1
      - WORKER_CONCURRENCY=2
      - LOG_LEVEL=info
      - PORT=5002
      - NODE_ENV=development
    depends_on:
      - redis
    volumes:
      - ../worker:/app
      - /app/node_modules
      - worker_uploads:/app/uploads
    command: pnpm dev
    restart: unless-stopped

  scheduler:
    build:
      context: ../worker
    container_name: scheduler
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - NODE_ENV=development
    depends_on:
      - redis
    volumes:
      - ../worker:/app
      - /app/node_modules
    command: pnpm run start:scheduler
    restart: unless-stopped

volumes:
  redis_data:
  worker_uploads: