name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["Build & Push to DockerHub"]
    branches: [main]
    types: [completed]
  
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Set up Node.js for Pulumi
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Pulumi dependencies
        run: |
          cd infra-pulumi
          pnpm install

      - name: Run Pulumi Refresh
        run: |
          cd infra-pulumi
          pnpm exec pulumi refresh --stack dev --yes --non-interactive
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Run Pulumi Deployment
        id: pulumi
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: dev
          work-dir: infra-pulumi
          upsert: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Get EC2 Credentials from Pulumi
        id: ec2
        run: |
          cd infra-pulumi
          PUBLIC_IP=$(pulumi stack output publicIp --stack dev)
          echo "public_ip=${PUBLIC_IP}" >> $GITHUB_OUTPUT
          
          BUCKET=$(pulumi stack output reportsBucket --stack dev)
          echo "reports_bucket=${BUCKET}" >> $GITHUB_OUTPUT
          
          echo "private_key<<EOF" >> $GITHUB_OUTPUT
          pulumi stack output privateKey --stack dev --show-secrets >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Wait for EC2 to be ready
        run: |
          echo "Waiting 60 seconds for EC2 instance to initialize..."
          sleep 60

      - name: Deploy Services via SSH
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REPORTS_BUCKET_NAME: ${{ steps.ec2.outputs.reports_bucket }}
          AWS_REGION: ap-southeast-1
        with:
          host: ${{ steps.ec2.outputs.public_ip }}
          username: ec2-user
          key: ${{ steps.ec2.outputs.private_key }}
          timeout: 120s
          envs: DOCKERHUB_USERNAME,REPORTS_BUCKET_NAME,AWS_REGION
          script: |
            set -e
            cd ~/distributed-report-queue
            git fetch origin
            git reset --hard origin/main

            cat > .env << EOF
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_URL=redis://redis:6379
            DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            DOCKER_IMAGE_TAG=latest
            NODE_ENV=production
            REPORTS_BUCKET_NAME=$REPORTS_BUCKET_NAME
            AWS_REGION=$AWS_REGION
            EOF

            cp .env infra/.env
            cd infra
            docker-compose -f docker-compose.prod.yml down --remove-orphans
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --scale worker=2
            docker system prune -af --volumes=false

      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REPORTS_BUCKET_NAME: ${{ steps.ec2.outputs.reports_bucket }}
          AWS_REGION: ap-southeast-1
        with:
          host: ${{ steps.ec2.outputs.public_ip }}
          username: ec2-user
          key: ${{ steps.ec2.outputs.private_key }}
          timeout: 120s
          envs: DOCKERHUB_USERNAME,REPORTS_BUCKET_NAME,AWS_REGION
          script: |
            set -e
            cd ~/distributed-report-queue/infra

            echo "Checking initialization logs (user-data.log)..."
            if [ -f /var/log/user-data.log ]; then
              tail -n 20 /var/log/user-data.log || true
            else
              echo "user-data.log not found."
            fi

            echo "Waiting 30 seconds for services to stabilize..."
            sleep 30

            echo "Checking container status..."
            docker-compose -f docker-compose.prod.yml ps

            # Test all endpoints
            echo "Running health checks..."
            PRODUCER_STATUS=$(curl -sf http://127.0.0.1:5001/health || echo "unreachable")
            API_STATUS=$(curl -sf http://127.0.0.1:5003/health || echo "unreachable")

            echo "Producer Health: $PRODUCER_STATUS"
            echo "API Health: $API_STATUS"

            if [[ "$PRODUCER_STATUS" == *"Ok"* ]] && [[ "$API_STATUS" == *"healthy"* ]]; then
              echo "All services running and healthy!"
              exit 0
            else
              echo "Deployment verification failed!"
              echo "--- Docker Stats ---"
              docker stats --no-stream || true
              echo "--- Container Status ---"
              docker-compose -f docker-compose.prod.yml ps
              echo "--- Producer Logs ---"
              docker-compose -f docker-compose.prod.yml logs producer | tail -n 50 || true
              echo "--- Dashboard API Logs ---"
              docker-compose -f docker-compose.prod.yml logs dashboard-api | tail -n 50 || true
              exit 1
            fi