name: Build & Push to DockerHub

on:
  push:
    branches: [main]
    paths: 
      - 'infra/**'
      - 'worker/**'
      - 'producer/**'
      - 'dashboard-api/**'
      - 'dashboard-frontend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: 
          - name: producer
            dockerfile: ./producer/Dockerfile
            
          - name: worker
            dockerfile: ./worker/Dockerfile
            
          - name: scheduler
            dockerfile: ./worker/Dockerfile
            
          - name: dashboard-api
            dockerfile: ./dashboard-api/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:latest

  build-and-push-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build Frontend
        run: |
          cd dashboard-frontend
          pnpm install
          pnpm build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Dashboard UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/dashboard-ui:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/dashboard-ui:latest

  notify-success:
    needs: [build-and-push, build-and-push-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "All images built and pushed!"
          else
            echo "Build failed!"
            exit 1
          fi